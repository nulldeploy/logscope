---
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: 1.0.0
    container_name: logscope
    restart: unless-stopped
    ports:
      - '5000:5000'
    command: ['python', 'logscope.py', 'serve']
    networks:
      - logscope-net

