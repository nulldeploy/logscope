---

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: 1.0.0
    container_name: logscope
    restart: unless-stopped
    ports:
      - '5000:5000'
    command: ['python', 'logscope.py', 'serve']
  
  nginx:
    image: nginx:latest
    container_name: logscope-nginx
    restart: unless-stopped
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    ports:
      - '80:80'
      - '443:443'